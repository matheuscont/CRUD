<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link href="style/style.css" rel="stylesheet" type="text/css">
    <title> CRUD BÁSICO </title>
</head>
<body>
    <header> Cadastrar novo funcionário </header> 
    <form> 
        <div class="container">
            <div class="row">
                <div class="col">
                    <label for="nome_completo"> Nome Completo: </label> <br>
                    <input class="form-control" type="text" required="required" id="nome_completo" name="nome completo" placeholder="Nome"><br>
                </div>
                <div class="col">
                    <label for="telefone"> Telefone: </label><br>
                    <input class="form-control" type="tel" required="required" id="telefone" name="telefone" placeholder="Telefone" ><br>  
                </div>
                <div class="row"> 
                    <div class="col"> 
                        <label for="data_nascimento"> Data de Nascimento: </label><br>
                        <input class="form-control" type="date" required="required" id="data_nascimento" name="data_nascimento"><br>
                    </div>
                    <div class="col"> 
                        <label for="email"> Email: </label><br>
                        <input class="form-control" type="email" required="required" id="email" name="email" placeholder="Email"><br> 
                    </div>
                    <div class="col">
                        <label for="sexo"> Sexo: </label><br>
                        <select class="form-control" id="sexo" name="sexo">
                            <option value=""></option>
                            <option value="masculino"> Masculino </option>
                            <option value="feminino"> Feminino </option> 
                        </select><br>
                    </div>
                </div>
                <div>
                    <input id=submit type="submit" value="cadastrar">
                </div>
        </div> 
    </form> 
    
</body>
</html>
