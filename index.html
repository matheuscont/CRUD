<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> CRUD BÁSICO </title>
</head>
<body>
    <header> Cadastrar novo funcionário </header> 

    <form> 
        <label for="nome_completo"> Nome Completo: </label><br>
        <input type="text" required="required" id="nome_completo" name="nome completo" placeholder="Nome"><br>
        <label for="telefone"> Telefone: </label><br>
        <input type="tel" required="required" id="telefone" name="telefone" placeholder="Telefone" maxlenght="12" pattern="\([0-9]{2}\)[\s][0-9]{4}-[0-9]{4}"><br>
        <label for="data_nascimento"> Data de Nascimento: </label><br>
        <input type="date" required="required" id="data_nascimento" name="data_nascimento"><br>
        <label for="email"> Email: </label><br>
        <input type="email" required="required" id="email" name="email" placeholder="Email"><br> 
        <label for="sexo"> Sexo: </label><br>
        <select id="sexo" name="sexo">
            <option value=""></option>
            <option value="masculino"> Masculino </option>
            <option value="feminino"> Feminino </option> 
        </select><br>
        <input type="submit" value="cadastrar">
    </form>
    
</body>
</html>
